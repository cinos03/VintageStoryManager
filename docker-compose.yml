name: vsmanager

services:
  manager:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: vsmanager-manager:latest
    container_name: vsmanager
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MANAGER_PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-change-me-please}"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      VS_VERSION: "${VS_VERSION:-1.22.3}"
      VS_CHANNEL: "${VS_CHANNEL:-stable}"
      VS_GAME_PORT: "42420"
      VS_CONTAINER_NAME: "vs-server"
      VS_SERVER_IMAGE: "vsmanager-vs-server:latest"
      VS_NETWORK: "vsmanager_default"
      # Host paths used when the manager creates the vs-server container.
      # These MUST be absolute paths on the Docker host.
      HOST_DATA_DIR: "${HOST_DATA_DIR:-/opt/vsmanager/data}"
      HOST_GAME_DIR: "${HOST_GAME_DIR:-/opt/vsmanager/versions}"
    volumes:
      # Control the Docker daemon to manage the vs-server container.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the same data dir the vs-server uses so the manager can read/write
      # the Mods folder directly. Left side MUST match HOST_DATA_DIR.
      - "${HOST_DATA_DIR:-/opt/vsmanager/data}:/data"

  # The vs-server image is built here so the manager can create containers from
  # it, but it is not started by compose — the manager starts/stops it on demand.
  vs-server:
    build:
      context: ./vs-server
      dockerfile: Dockerfile
    image: vsmanager-vs-server:latest
    profiles:
      - build-only
